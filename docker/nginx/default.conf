# =============================================================
# Configuration Nginx pour LocaDjelo (Laravel)
# =============================================================

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Racine du site = dossier public/ de Laravel
    root /var/www/html/public;
    index index.php index.html;

    # Logs
    access_log /var/log/nginx/locadjelo_access.log;
    error_log /var/log/nginx/locadjelo_error.log;

    # Sécurité : taille maximale des uploads
    client_max_body_size 20M;

    # Routing Laravel : toutes les requêtes passent par index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Traitement des fichiers PHP via PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Sécurité : bloquer l'accès aux fichiers cachés (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Optimisation : cache des fichiers statiques
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}