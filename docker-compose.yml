# =============================================================
# Docker Compose - Environnement de test LocaDjelo
# Compétences BC02 : CP5 (env de test), CP6 (stockage), CP7 (containers)
# =============================================================

services:

  # ====== APPLICATION LARAVEL (PHP-FPM) ======
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: locadjelo_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    networks:
      - locadjelo_network
    depends_on:
      - mysql
      - redis
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  # ====== SERVEUR WEB NGINX ======
  nginx:
    image: nginx:alpine
    container_name: locadjelo_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - locadjelo_network
    depends_on:
      - app

  # ====== BASE DE DONNÉES MYSQL ======
  mysql:
    image: mysql:8.0
    container_name: locadjelo_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3308:3306"
    networks:
      - locadjelo_network
    command: --default-authentication-plugin=mysql_native_password

  # ====== CACHE REDIS ======
  redis:
    image: redis:alpine
    container_name: locadjelo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - locadjelo_network

# ====== RÉSEAU INTERNE ======
networks:
  locadjelo_network:
    driver: bridge

# ====== VOLUMES PERSISTANTS ======
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local