# =============================================================
# Application LocaDjelo (Laravel + Nginx) — Kubernetes
# ConfigMap + Deployment + Service
# =============================================================

# --- ConfigMap : configuration Nginx ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: locadjelo
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        root /var/www/html/public;
        index index.php index.html;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }

        location ~ /\. {
            deny all;
        }
    }

---

# --- Deployment : pod avec initContainer + 2 containers ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locadjelo-app
  namespace: locadjelo
  labels:
    app: locadjelo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: locadjelo-app
  template:
    metadata:
      labels:
        app: locadjelo-app
    spec:
      # InitContainer : copie le code source dans un volume partagé
      # S'exécute AVANT les containers principaux
      initContainers:
        - name: copy-code
          image: djelodev/locadjelo-app:v1.0
          command: ["sh", "-c", "cp -r /var/www/html/. /shared/"]
          volumeMounts:
            - name: app-code
              mountPath: /shared

      containers:
        # Container 1 : PHP-FPM (Laravel)
        - name: app
          image: djelodev/locadjelo-app:v1.0
          ports:
            - containerPort: 9000
          env:
            - name: DB_HOST
              value: "mysql"
            - name: DB_PORT
              value: "3306"
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
          volumeMounts:
            - name: app-code
              mountPath: /var/www/html
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"

        # Container 2 : Nginx (reverse proxy)
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: app-code
              mountPath: /var/www/html

      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: app-code
          emptyDir: {}

---

# --- Service : expose l'application sur le cluster ---
apiVersion: v1
kind: Service
metadata:
  name: locadjelo-app
  namespace: locadjelo
spec:
  selector:
    app: locadjelo-app
  ports:
    - port: 80
      targetPort: 80
  type: NodePort