# =============================================================
# MySQL pour LocaDjelo — Kubernetes
# Secret + Stockage persistant + Deployment + Service
# =============================================================

# --- Secret : identifiants MySQL (encodés en base64) ---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: locadjelo
type: Opaque
data:
  # Valeurs encodées en base64 :
  # echo -n "locadjelo" | base64 → bG9jYWRqZWxv
  # echo -n "locadjelo_user" | base64 → bG9jYWRqZWxvX3VzZXI=
  # echo -n "locadjelo2026" | base64 → bG9jYWRqZWxvMjAyNg==
  # echo -n "root_secure_2026" | base64 → cm9vdF9zZWN1cmVfMjAyNg==
  MYSQL_DATABASE: bG9jYWRqZWxv
  MYSQL_USER: bG9jYWRqZWxvX3VzZXI=
  MYSQL_PASSWORD: bG9jYWRqZWxvMjAyNg==
  MYSQL_ROOT_PASSWORD: cm9vdF9zZWN1cmVfMjAyNg==

---

# --- PersistentVolumeClaim : stockage persistant pour MySQL ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: locadjelo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---

# --- Deployment : pod MySQL ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: locadjelo
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc

---

# --- Service : expose MySQL aux autres pods ---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: locadjelo
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None