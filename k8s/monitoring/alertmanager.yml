# =============================================================
# Alertmanager — Gestion des alertes
# Compétence BC03-CP10 : Exploiter une solution de supervision
# =============================================================

# --- ConfigMap : configuration Alertmanager ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: locadjelo
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'severity']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'default'

      routes:
        - match:
            severity: critical
          receiver: 'critical'
        - match:
            severity: warning
          receiver: 'default'

    receivers:
      - name: 'default'
        webhook_configs:
          - url: 'http://localhost:5001/'
            send_resolved: true

      - name: 'critical'
        webhook_configs:
          - url: 'http://localhost:5001/'
            send_resolved: true

---

# --- Deployment : pod Alertmanager ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: locadjelo
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:latest
          ports:
            - containerPort: 9093
          args:
            - '--config.file=/etc/alertmanager/alertmanager.yml'
          volumeMounts:
            - name: alertmanager-config
              mountPath: /etc/alertmanager/alertmanager.yml
              subPath: alertmanager.yml
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: alertmanager-config
          configMap:
            name: alertmanager-config

---

# --- Service : expose Alertmanager ---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: locadjelo
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093