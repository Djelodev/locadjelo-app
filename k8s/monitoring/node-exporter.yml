# =============================================================
# Node Exporter — Capteur de métriques système
# Compétence BC03-CP9 : Définir et mettre en place des statistiques
# =============================================================

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: locadjelo
  labels:
    app: node-exporter
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      containers:
        - name: node-exporter
          image: prom/node-exporter:latest
          ports:
            - containerPort: 9100
          args:
            - '--path.procfs=/host/proc'
            - '--path.sysfs=/host/sys'
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys

---

apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: locadjelo
spec:
  selector:
    app: node-exporter
  ports:
    - port: 9100
      targetPort: 9100